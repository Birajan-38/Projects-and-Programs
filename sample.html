<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Transition Examples</title>

<style>

body{
    font-family: Arial, sans-serif;
    padding:20px;
}

/* 1. ALL */
.box{
    width:150px;
    height:150px;
    background-color:blue;
    transition:all 1s ease;
}

.box:hover{
    background-color:red;
    transform:rotate(45deg) scale(1.3);
    border-radius:20px;
}

/* 2. WIDTH */
.width{
    width:150px;
    height:100px;
    background:green;
    transition:width 1s;
}

.width:hover{
    width:250px;
}

/* 3. HEIGHT */
.height{
    width:150px;
    height:100px;
    background:purple;
    transition:height 1s;
}

.height:hover{
    height:250px;
}

/* 4. COLOR */
.color{
    width:150px;
    height:100px;
    background:gray;
    transition:background-color 1s;
}

.color:hover{
    background-color:orange;
}

/* 5. BORDER RADIUS */
.radius{
    width:150px;
    height:150px;
    background:skyblue;
    transition:1s;
}

.radius:hover{
    border-radius:50%;
}

/* 6. ROTATE */
.rotate{
    width:150px;
    height:150px;
    background:tomato;
    transition:1s;
}

.rotate:hover{
    transform:rotate(360deg);
}

/* 7. SCALE */
.scale{
    width:150px;
    height:150px;
    background:gold;
    transition:1s;
}

.scale:hover{
    transform:scale(1.3);
}

/* 8. OPACITY */
.opacity{
    width:150px;
    height:150px;
    background:black;
    transition:1s;
}

.opacity:hover{
    opacity:0.3;
}

/* 9. IMAGE */
.image-box{
    width:250px;
    overflow:hidden;
}

.image-box img{
    width:100%;
    transition:1s;
}

.image-box img:hover{
    transform:scale(1.2);
}

/* 10. LINK */
a{
    text-decoration:none;
    color:black;
    font-size:22px;
    transition:0.5s;
}

a:hover{
    color:red;
    letter-spacing:3px;
}

.demo{
    margin:20px 0;
}

</style>
</head>

<body>

<h2>1. Transition All</h2>
<div class="box demo"></div>

<h2>2. Width</h2>
<div class="width demo"></div>

<h2>3. Height</h2>
<div class="height demo"></div>

<h2>4. Color</h2>
<div class="color demo"></div>

<h2>5. Border Radius</h2>
<div class="radius demo"></div>

<h2>6. Rotate</h2>
<div class="rotate demo"></div>

<h2>7. Scale</h2>
<div class="scale demo"></div>

<h2>8. Opacity</h2>
<div class="opacity demo"></div>

<h2>9. Image Zoom</h2>
<div class="image-box">
    <img src="https://picsum.photos/300" alt="image">
</div>

<h2>10. Link Transition</h2>
<a href="#">Hover Me</a>

</body>
</html>
