<!DOCTYPE html>
<html>
<head>
    <title>CSS Transition Example</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: white;
        }

        .box {
            width: 150px;
            height: 150px;
            background-color: blue;

            /* Transition Property */
            transition: all 1s ease;
        }

        .box:hover {
            background-color: black;
            transform: rotate(45deg) scale(1.2);
        }
    </style>
</head>

<body>
    <div class="box"></div>
</body>
</html>
